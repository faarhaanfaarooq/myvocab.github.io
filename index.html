<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vocabulary Flashcards – Word List 1/4</title>
    <style>
      :root {
        --bg-color: #f4f6fb;
        --text-color: #222;
        --header-bg: #2d3a8c;
        --header-text: #fff;
        --card-bg: #fff;
        --card-border: #e0e4f0;
        --primary-color: #2d3a8c;
        --primary-hover: #1e2a6a;
        --secondary-bg: #e8eaf6;
        --secondary-text: #2d3a8c;
        --secondary-hover: #c5cae9;
        --control-bg: #fff;
        --input-border: #c8cfe8;
        --muted-text: #666;
        --shadow-color: rgba(45, 58, 140, 0.1);
        --quiz-opt-bg: #f4f6fb;
        --quiz-opt-border: #c5cae9;
      }

      [data-theme="dark"] {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --header-bg: #1f1f1f;
        --header-text: #bb86fc;
        --card-bg: #1e1e1e;
        --card-border: #333;
        --primary-color: #bb86fc;
        --primary-hover: #a370f7;
        --secondary-bg: #2c2c2c;
        --secondary-text: #bb86fc;
        --secondary-hover: #3e3e3e;
        --control-bg: #1e1e1e;
        --input-border: #444;
        --muted-text: #aaa;
        --shadow-color: rgba(0, 0, 0, 0.5);
        --quiz-opt-bg: #1e1e1e;
        --quiz-opt-border: #444;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg-color);
        color: var(--text-color);
        min-height: 100vh;
        transition:
          background 0.3s,
          color 0.3s;
      }
      header {
        background: var(--header-bg);
        color: var(--header-text);
        padding: 18px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
      }
      header h1 {
        font-size: 1.3rem;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      header span {
        font-size: 0.9rem;
        opacity: 0.85;
      }
      .theme-toggle {
        cursor: pointer;
        padding: 8px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.1);
      }
      .controls {
        background: var(--control-bg);
        padding: 14px 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        border-bottom: 1px solid var(--card-border);
      }
      .controls input[type="text"] {
        flex: 1;
        min-width: 180px;
        padding: 8px 12px;
        border: 1px solid var(--input-border);
        border-radius: 8px;
        font-size: 0.92rem;
        background: var(--control-bg);
        color: var(--text-color);
      }
      .controls select {
        padding: 8px 12px;
        border: 1px solid var(--input-border);
        border-radius: 8px;
        font-size: 0.92rem;
        background: var(--control-bg);
        color: var(--text-color);
      }
      .btn {
        padding: 8px 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 500;
        transition: background 0.15s;
      }
      .btn-primary {
        background: var(--primary-color);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--primary-hover);
      }
      .btn-secondary {
        background: var(--secondary-bg);
        color: var(--secondary-text);
      }
      .btn-secondary:hover {
        background: var(--secondary-hover);
      }
      .btn-danger {
        background: #e53935;
        color: #fff;
      }
      .progress-bar {
        height: 5px;
        background: var(--card-border);
      }
      .progress-fill {
        height: 5px;
        background: var(--primary-color);
        transition: width 0.3s;
      }

      /* FLASHCARD MODE */
      #flashcard-section {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        padding: 30px 16px;
      }
      .fc-counter {
        font-size: 0.9rem;
        color: var(--muted-text);
        margin-bottom: 18px;
      }
      .card-wrap {
        perspective: 1000px;
        width: 100%;
        max-width: 520px;
        height: 300px;
        cursor: pointer;
      }
      .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.5s;
        transform-style: preserve-3d;
      }
      .card-wrap.flipped .card-inner {
        transform: rotateY(180deg);
      }
      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 18px;
        padding: 30px 28px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-shadow: 0 4px 24px var(--shadow-color);
      }
      .card-front {
        background: linear-gradient(135deg, #2d3a8c, #5c6bc0);
        color: #fff;
      }
      [data-theme="dark"] .card-front {
        background: linear-gradient(135deg, #3700b3, #6200ee);
      }
      .card-back {
        background: var(--card-bg);
        transform: rotateY(180deg);
        border: 2px solid var(--card-border);
      }
      .card-num {
        font-size: 0.78rem;
        opacity: 0.7;
        margin-bottom: 10px;
        font-weight: 500;
      }
      .card-word {
        font-size: 2.1rem;
        font-weight: 700;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
      }
      .speaker-btn {
        cursor: pointer;
        font-size: 1.4rem;
        opacity: 0.8;
        transition: transform 0.1s;
      }
      .speaker-btn:hover {
        transform: scale(1.1);
        opacity: 1;
      }
      .card-hint {
        font-size: 0.85rem;
        opacity: 0.75;
      }
      .card-bengali {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--primary-color);
        margin-bottom: 10px;
      }
      .card-synonyms {
        font-size: 0.85rem;
        color: #1b5e20;
        margin-bottom: 10px;
        font-weight: 600;
        background-color: #c8e6c9;
        padding: 2px 6px;
        border-radius: 4px;
        display: inline-block;
      }
      [data-theme="dark"] .card-synonyms {
        background-color: #2e7d32;
        color: #e8f5e9;
      }
      .card-sentence {
        font-size: 0.92rem;
        color: var(--text-color);
        line-height: 1.5;
        border-left: 3px solid var(--primary-color);
        padding-left: 10px;
        font-style: italic;
      }
      .fc-actions {
        display: flex;
        gap: 12px;
        margin-top: 22px;
        flex-wrap: wrap;
        justify-content: center;
      }

      /* LIST/TABLE MODE */
      #list-section {
        padding: 20px;
        display: none;
      }
      .word-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 14px;
      }
      .word-card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 16px 18px;
        border: 1px solid var(--card-border);
        transition: box-shadow 0.2s;
      }
      .word-card:hover {
        box-shadow: 0 4px 16px var(--shadow-color);
      }
      .wc-top {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 6px;
      }
      .wc-num {
        font-size: 0.75rem;
        color: var(--muted-text);
        min-width: 28px;
      }
      .wc-word {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--primary-color);
      }
      .wc-bengali {
        font-size: 0.88rem;
        color: #e65100;
        font-weight: 600;
        margin-bottom: 5px;
      }
      [data-theme="dark"] .wc-bengali {
        color: #ffb74d;
      }
      .wc-synonyms {
        font-size: 0.78rem;
        color: #1b5e20;
        margin-bottom: 5px;
        font-weight: 600;
        background-color: #c8e6c9;
        padding: 1px 4px;
        border-radius: 3px;
        display: inline-block;
      }
      [data-theme="dark"] .wc-synonyms {
        background-color: #2e7d32;
        color: #e8f5e9;
      }
      .wc-sentence {
        font-size: 0.82rem;
        color: var(--text-color);
        font-style: italic;
        line-height: 1.4;
        border-left: 2px solid var(--secondary-hover);
        padding-left: 8px;
      }

      /* QUIZ MODE */
      #quiz-section {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        padding: 30px 16px;
      }
      .quiz-box {
        background: var(--card-bg);
        border-radius: 18px;
        padding: 28px;
        max-width: 520px;
        width: 100%;
        box-shadow: 0 4px 24px var(--shadow-color);
      }
      .quiz-q {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 8px;
        text-align: center;
      }
      .quiz-sub {
        font-size: 0.85rem;
        color: var(--muted-text);
        margin-bottom: 20px;
        text-align: center;
      }
      .quiz-options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .quiz-opt {
        padding: 12px 14px;
        border: 1.5px solid var(--quiz-opt-border);
        border-radius: 10px;
        background: var(--quiz-opt-bg);
        color: var(--text-color);
        cursor: pointer;
        font-size: 0.92rem;
        text-align: center;
        transition: all 0.15s;
      }
      .quiz-opt:hover {
        background: var(--secondary-bg);
        border-color: var(--primary-color);
      }
      .quiz-opt.correct {
        background: #e8f5e9;
        border-color: #43a047;
        color: #2e7d32;
      }
      [data-theme="dark"] .quiz-opt.correct {
        background: #1b5e20;
        border-color: #2e7d32;
        color: #e8f5e9;
      }
      .quiz-opt.wrong {
        background: #ffebee;
        border-color: #e53935;
        color: #c62828;
      }
      [data-theme="dark"] .quiz-opt.wrong {
        background: #b71c1c;
        border-color: #c62828;
        color: #ffebee;
      }
      .quiz-score {
        font-size: 1rem;
        color: var(--muted-text);
        margin: 14px 0 0;
        text-align: center;
      }

      #mode-tabs {
        display: flex;
        background: var(--card-bg);
        border-bottom: 1px solid var(--card-border);
      }
      .tab {
        flex: 1;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        font-size: 0.92rem;
        font-weight: 500;
        color: var(--muted-text);
        border-bottom: 3px solid transparent;
        transition: all 0.15s;
      }
      .tab.active {
        color: var(--primary-color);
        border-bottom-color: var(--primary-color);
      }
      .tab:hover {
        background: var(--quiz-opt-bg);
      }

      .no-result {
        padding: 40px;
        text-align: center;
        color: var(--muted-text);
        font-size: 1rem;
      }
      .stats-bar {
        display: flex;
        gap: 16px;
        padding: 10px 20px;
        background: var(--secondary-bg);
        font-size: 0.82rem;
        color: var(--primary-color);
        flex-wrap: wrap;
      }
      .stats-bar span {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>📚 Vocabulary Flashcards — Word List 1/4</h1>
      <div style="display: flex; align-items: center; gap: 15px">
        <div
          class="theme-toggle"
          onclick="toggleTheme()"
          title="Toggle Dark/Light Mode"
        >
          <span id="theme-icon">🌙</span>
        </div>
        <span id="header-count">343 words</span>
      </div>
    </header>

    <div id="mode-tabs">
      <div class="tab active" onclick="switchMode('flashcard')">
        🃏 Flashcards
      </div>
      <div class="tab" onclick="switchMode('list')">📋 Word List</div>
      <div class="tab" onclick="switchMode('quiz')">🧠 Quiz</div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>

    <!-- FLASHCARD MODE -->
    <div id="flashcard-section">
      <div class="stats-bar">
        <div>Total: <span>343</span></div>
        <div>Seen: <span id="fc-seen">0</span></div>
        <div>Remaining: <span id="fc-remaining">343</span></div>
      </div>
      <br />
      <div class="fc-counter" id="fc-counter">Card 1 of 343</div>
      <div class="card-wrap" id="card-wrap" onclick="flipCard()">
        <div class="card-inner" id="card-inner">
          <div class="card-face card-front">
            <div class="card-num" id="cf-num"></div>
            <div class="card-word">
              <span id="cf-word"></span>
              <span
                class="speaker-btn"
                onclick="
                  event.stopPropagation();
                  speakWord();
                "
                title="Listen pronunciation"
                >🔊</span
              >
            </div>
            <div class="card-hint">👆 Click to reveal meaning</div>
          </div>
          <div class="card-face card-back">
            <div class="card-num" id="cb-num"></div>
            <div class="card-bengali" id="cb-bengali"></div>
            <div class="card-synonyms" id="cb-synonyms"></div>
            <div class="card-sentence" id="cb-sentence"></div>
          </div>
        </div>
      </div>
      <div class="fc-actions">
        <button class="btn btn-secondary" onclick="prevCard()">← Prev</button>
        <button class="btn btn-primary" onclick="flipCard()">Flip</button>
        <button class="btn btn-secondary" onclick="nextCard()">Next →</button>
        <button class="btn btn-danger" onclick="shuffleCards()">
          🔀 Shuffle
        </button>
      </div>
    </div>

    <!-- LIST MODE -->
    <div id="list-section">
      <div class="controls">
        <input
          type="text"
          id="search-box"
          placeholder="🔍 Search word or Bengali meaning..."
          oninput="filterWords()"
        />
        <select id="sort-select" onchange="filterWords()">
          <option value="default">Sort: Default</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
        </select>
      </div>
      <br />
      <div class="word-grid" id="word-grid"></div>
      <div class="no-result" id="no-result" style="display: none">
        No words found.
      </div>
    </div>

    <!-- QUIZ MODE -->
    <div id="quiz-section">
      <div class="quiz-box">
        <div class="quiz-q" id="quiz-q"></div>
        <div class="quiz-sub" id="quiz-sub">
          Choose the correct Bengali meaning:
        </div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="quiz-score" id="quiz-score"></div>
        <br />
        <div style="display: flex; gap: 10px; justify-content: center">
          <button class="btn btn-primary" onclick="nextQuiz()">
            Next Question →
          </button>
          <button class="btn btn-secondary" onclick="resetQuiz()">
            Reset Quiz
          </button>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const targetTheme = currentTheme === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", targetTheme);
        const icon = document.getElementById("theme-icon");
        icon.innerText = targetTheme === "dark" ? "☀️" : "🌙";
        localStorage.setItem("vocab-theme", targetTheme);
      }

      // Load theme on startup
      (function () {
        const savedTheme = localStorage.getItem("vocab-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
          const icon = document.getElementById("theme-icon");
          if (icon) icon.innerText = savedTheme === "dark" ? "☀️" : "🌙";
        } else if (
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
        ) {
          // Optional: auto-dark mode based on system preference
          // document.documentElement.setAttribute('data-theme', 'dark');
          // if (icon) icon.innerText = '☀️';
        }
      })();

      const words = [
        {
          n: 1,
          w: "Abate",
          b: "হ্রাস পাওয়া / কমে যাওয়া",
          s: "Slack Off/ Decrease/ Diminish/ Slacken",
          e: "The storm finally began to abate after three days of heavy rain.",
        },
        {
          n: 2,
          w: "Aberrant",
          b: "অস্বাভাবিক / বিচ্যুত",
          s: "Abnormal/ Deviant/ Stray",
          e: "His aberrant behaviour at the meeting shocked all his colleagues.",
        },
        {
          n: 3,
          w: "Abhor",
          b: "ঘৃণা করা / বিদ্বেষ করা",
          s: "Hate/ Detest/ Despise/ Loathe",
          e: "She abhors violence and refuses to watch any action movies.",
        },
        {
          n: 4,
          w: "Abhorrent",
          b: "মনের কাছে আপত্তিজনক / ঘৃণ্য",
          s: "Offensive/ Obscene/ Repugnant/ Repulsive",
          e: "Cruelty to animals is abhorrent to every decent person.",
        },
        {
          n: 5,
          w: "Abortive",
          b: "ব্যর্থ / নিষ্ফল",
          s: "Unsuccessful/ Bungled/ Failed",
          e: "The rescue team made an abortive attempt to reach the trapped miners.",
        },
        {
          n: 6,
          w: "Abounded",
          b: "প্রচুর ছিল / ভরপুর ছিল",
          s: "Plentiful/ Abundant/ Ample/ Plethoric",
          e: "The forest abounded with rare birds and colourful butterflies.",
        },
        {
          n: 7,
          w: "Abscond",
          b: "পালিয়ে যাওয়া / চম্পট দেওয়া",
          s: "Flee/ Escape/ Run Away/ Run Off",
          e: "The thief absconded with all the jewellery before the police arrived.",
        },
        {
          n: 8,
          w: "Abstemious",
          b: "সংযমী / মিতাচারী",
          s: "Self-Restrained/ Moderate/ Frugal",
          e: "He lived an abstemious life, eating only simple food and drinking only water.",
        },
        {
          n: 9,
          w: "Abstruse",
          b: "জটিল / দুর্বোধ্য",
          s: "Complex/ Perplex/ Recondite/ Difficult",
          e: "The professor's lecture was so abstruse that most students fell asleep.",
        },
        {
          n: 10,
          w: "Accede",
          b: "সম্মত হওয়া / রাজি হওয়া",
          s: "Agree/ Consent/ Acquiesce/ Comply",
          e: "After long negotiations, the company acceded to the workers' demands.",
        },
        {
          n: 11,
          w: "Accentuate",
          b: "জোর দেওয়া / গুরুত্ব বাড়ানো",
          s: "Emphasize/ Underline/ Highlight",
          e: "The new lighting in the room accentuated the beauty of the painting.",
        },
        {
          n: 12,
          w: "Accolade",
          b: "পুরস্কার / প্রশংসা",
          s: "Award/ Honour/ Praise/ Complement",
          e: "The young scientist received the highest accolade at the national conference.",
        },
        {
          n: 13,
          w: "Ached",
          b: "আকাঙ্ক্ষা করা / গভীরভাবে চাওয়া",
          s: "Yearned/ Wished/ Longed/ Hankered",
          e: "She ached for the days when her family was all together.",
        },
        {
          n: 14,
          w: "Acquiesce",
          b: "মেনে নেওয়া / নীরবে সম্মত হওয়া",
          s: "Agree/ Consent/ Accede/ Comply",
          e: "He acquiesced to his parents' wishes and studied medicine.",
        },
        {
          n: 15,
          w: "Acuity",
          b: "তীক্ষ্ণতা / বুদ্ধির ধার",
          s: "Sharpness/ Keenness/ Perspicacity",
          e: "Her mental acuity allowed her to solve the puzzle in minutes.",
        },
        {
          n: 16,
          w: "Acumen",
          b: "তীক্ষ্ণ বুদ্ধি / বিচক্ষণতা",
          s: "Discernment/ Shrewdness/ Astute/ Perspicacity",
          e: "His business acumen helped him build a successful company from scratch.",
        },
        {
          n: 17,
          w: "Adduce",
          b: "প্রমাণ হিসেবে উল্লেখ করা / উদ্ধৃত করা",
          s: "Cite/ Abduce/ Reference",
          e: "The lawyer adduced several witnesses to prove his client's innocence.",
        },
        {
          n: 18,
          w: "Advent",
          b: "আগমন / শুরু",
          s: "Arrival/ Emergence/ Beginning",
          e: "The advent of the internet changed the way people communicate.",
        },
        {
          n: 19,
          w: "Adversary",
          b: "প্রতিপক্ষ / শত্রু",
          s: "Opponent/ Antagonist/ Competitor/ Rival",
          e: "Despite being adversaries in court, the two lawyers respected each other.",
        },
        {
          n: 20,
          w: "Affable",
          b: "বন্ধুত্বপূর্ণ / মিষ্টভাষী",
          s: "Amiable/ Genial/ Cordial/ Friendly",
          e: "The affable shopkeeper always greeted his customers with a warm smile.",
        },
        {
          n: 21,

      let currentIndex = 0;
      let order = [...Array(words.length).keys()];
      let quizScore = 0,
        quizTotal = 0,
        quizAnswered = false;
      let currentQuizWord = null;

      function switchMode(mode) {
        document
          .querySelectorAll(".tab")
          .forEach((t, i) => t.classList.remove("active"));
        document.getElementById("flashcard-section").style.display = "none";
        document.getElementById("list-section").style.display = "none";
        document.getElementById("quiz-section").style.display = "none";
        const tabs = document.querySelectorAll(".tab");
        if (mode === "flashcard") {
          tabs[0].classList.add("active");
          document.getElementById("flashcard-section").style.display = "flex";
          renderCard();
        }
        if (mode === "list") {
          tabs[1].classList.add("active");
          document.getElementById("list-section").style.display = "block";
          renderList();
        }
        if (mode === "quiz") {
          tabs[2].classList.add("active");
          document.getElementById("quiz-section").style.display = "flex";
          renderQuiz();
        }
      }

      function renderCard() {
        const w = words[order[currentIndex]];
        document.getElementById("cf-num").textContent = "#" + w.n;
        document.getElementById("cf-word").textContent = w.w;
        document.getElementById("cb-num").textContent = "#" + w.n + " — " + w.w;
        document.getElementById("cb-bengali").textContent = "🇧🇩 " + w.b;
        document.getElementById("cb-synonyms").textContent = "🔗 " + w.s;
        document.getElementById("cb-sentence").textContent = '"' + w.e + '"';
        document.getElementById("card-wrap").classList.remove("flipped");
        document.getElementById("fc-counter").textContent =
          "Card " + (currentIndex + 1) + " of " + words.length;
        document.getElementById("fc-seen").textContent = currentIndex + 1;
        document.getElementById("fc-remaining").textContent =
          words.length - currentIndex - 1;
        const pct = (((currentIndex + 1) / words.length) * 100).toFixed(1);
        document.getElementById("progress-fill").style.width = pct + "%";
      }

      function flipCard() {
        document.getElementById("card-wrap").classList.toggle("flipped");
      }
      function nextCard() {
        if (currentIndex < words.length - 1) {
          currentIndex++;
          renderCard();
        }
      }
      function prevCard() {
        if (currentIndex > 0) {
          currentIndex--;
          renderCard();
        }
      }

      function speakWord() {
        const w = words[order[currentIndex]];
        const synth = window.speechSynthesis;
        if (!synth) return;
        const utter = new SpeechSynthesisUtterance(w.w);
        utter.lang = "en-US";
        utter.rate = 0.9;
        synth.speak(utter);
      }

      function shuffleCards() {
        for (let i = order.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [order[i], order[j]] = [order[j], order[i]];
        }
        currentIndex = 0;
        renderCard();
      }

      function renderList() {
        const q = document.getElementById("search-box").value.toLowerCase();
        const sort = document.getElementById("sort-select").value;
        let filtered = words.filter(
          (w) =>
            w.w.toLowerCase().includes(q) ||
            w.b.includes(q) ||
            w.s.toLowerCase().includes(q),
        );
        if (sort === "az") filtered.sort((a, b) => a.w.localeCompare(b.w));
        if (sort === "za") filtered.sort((a, b) => b.w.localeCompare(a.w));
        const grid = document.getElementById("word-grid");
        const noRes = document.getElementById("no-result");
        if (filtered.length === 0) {
          grid.innerHTML = "";
          noRes.style.display = "block";
          return;
        }
        noRes.style.display = "none";
        grid.innerHTML = filtered
          .map(
            (w) => `
    <div class="word-card">
      <div class="wc-top"><span class="wc-num">#${w.n}</span><span class="wc-word">${w.w}</span></div>
      <div class="wc-bengali">${w.b}</div>
      <div class="wc-synonyms">${w.s}</div>
      <div class="wc-sentence">${w.e}</div>
    </div>`,
          )
          .join("");
      }

      function filterWords() {
        renderList();
      }

      function renderQuiz() {
        const idx = Math.floor(Math.random() * words.length);
        currentQuizWord = words[idx];
        quizAnswered = false;
        document.getElementById("quiz-q").textContent = currentQuizWord.w;
        document.getElementById("quiz-sub").textContent =
          "What is the Bengali meaning of this word?";
        const wrong = [];
        while (wrong.length < 3) {
          const r = words[Math.floor(Math.random() * words.length)];
          if (r.n !== currentQuizWord.n && !wrong.find((x) => x.n === r.n))
            wrong.push(r);
        }
        const options = [currentQuizWord, ...wrong].sort(
          () => Math.random() - 0.5,
        );
        document.getElementById("quiz-options").innerHTML = options
          .map(
            (o) =>
              `<div class="quiz-opt" onclick="checkAnswer(this,'${o.n}')">${o.b}</div>`,
          )
          .join("");
        document.getElementById("quiz-score").textContent =
          quizTotal > 0 ? `Score: ${quizScore} / ${quizTotal}` : "";
      }

      function checkAnswer(el, nStr) {
        if (quizAnswered) return;
        quizAnswered = true;
        quizTotal++;
        const opts = document.querySelectorAll(".quiz-opt");
        opts.forEach((o) => {
          if (o.textContent === currentQuizWord.b) o.classList.add("correct");
        });
        if (nStr == currentQuizWord.n) {
          el.classList.add("correct");
          quizScore++;
        } else {
          el.classList.add("wrong");
        }
        document.getElementById("quiz-score").textContent =
          `Score: ${quizScore} / ${quizTotal}`;
      }

      function nextQuiz() {
        renderQuiz();
      }
      function resetQuiz() {
        quizScore = 0;
        quizTotal = 0;
        quizAnswered = false;
        renderQuiz();
      }

      window.onload = () => {
        switchMode("flashcard");
      };

      document.addEventListener("keydown", (e) => {
        if (
          document.getElementById("flashcard-section").style.display !== "none"
        ) {
          if (e.key === "ArrowRight") nextCard();
          if (e.key === "ArrowLeft") prevCard();
          if (e.key === " ") {
            e.preventDefault();
            flipCard();
          }
        }
      });
    </script>
